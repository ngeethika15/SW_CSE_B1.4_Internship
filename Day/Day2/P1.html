<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image tags</title>
</head>
<body>
    <!-- src: source alt: alternate text | self-closing tag-->
    <img src="i1.jpg" alt="could not find the image">
    <!--common attributes & variations-->
    <img src="i1.jpg" alt="could not find the image" width="800px" height="600px">
    <img src="i1.jpg" alt="could not find the image" title="Image of the Dog">
    <!--style-->
    <img src="i1.jpg" alt="could not find the image" style="width=800px; height=600px border-radius:50% ;border:2px solid #ccc;">
    <!--image format-->
    <!-- 1.Jpg 2.PNG 3.GIF 4.SVG 5.webp -->

</body>
</html>
