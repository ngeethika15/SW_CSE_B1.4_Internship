<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Tables</title>
</head>
<body>
    <p>HTML Tables</p>
    <p>tr: table row
        th: table header
        td: table data
    </p>
    <table border="1">
        <caption>Monthly Savings</caption>
        <tr>
            <th>Month</th>
            <th>Savings</th>
        </tr>
        <tr>
            <td>Jun</td>
            <td>50000</td>
        </tr>
        <tr>
            <td>Jul</td>
            <td>75000</td>
        </tr>
    </table>
    <table border="1"
        <caption>Sales Data</caption>
        <thread>
            <tr>
                <th>Montht</th>
                <th>Sales</th>
            </tr>
        </thread>
        <tbody>
            <tbody>
            <tr>
                <td>Jun</td>
                <td>500000</td>
            </tr>
            <tr>
                <td>Jul</td>
                <td>750000</td>
            </tr>
        </tbody>
        <tfoot>
            <tr>
                <td>Total</td>
                <td>1250000</td>
            </tr>
        </tfoot>

        </tbody>
    </table>
</body>
</html>
